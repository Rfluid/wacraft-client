<app-sidebar-layout [activePage]="RoutePath.billing">
    <div
        class="grow-1 scrollable mx-auto flex h-full w-full flex-col overflow-y-auto p-4 dark:bg-gray-900 dark:text-gray-100 sm:p-6"
    >
        <!-- Page Header -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 sm:text-3xl" i18n>
                Billing
            </h1>
            <p class="mt-1 text-sm text-gray-600 dark:text-gray-400" i18n>
                Manage your plans, subscriptions, and usage
            </p>
        </div>

        <!-- Tabs -->
        <div class="mb-6 border-b border-gray-200 dark:border-gray-700">
            <nav class="-mb-px flex space-x-6">
                <a
                    [routerLink]="[]"
                    fragment="plans"
                    queryParamsHandling="preserve"
                    [ngClass]="{
                        'border-b-2 border-blue-500 text-blue-600 dark:text-blue-400':
                            activeTab === 'plans',
                        'text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300':
                            activeTab !== 'plans',
                    }"
                    class="pb-3 text-sm font-medium transition-colors"
                    i18n
                >
                    Plans & Usage
                </a>
                <a
                    [routerLink]="[]"
                    fragment="subscriptions"
                    queryParamsHandling="preserve"
                    [ngClass]="{
                        'border-b-2 border-blue-500 text-blue-600 dark:text-blue-400':
                            activeTab === 'subscriptions',
                        'text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300':
                            activeTab !== 'subscriptions',
                    }"
                    class="pb-3 text-sm font-medium transition-colors"
                    i18n
                >
                    Subscriptions
                </a>
            </nav>
        </div>

        <!-- Tab Content -->
        <div class="min-h-0 flex-1">
            @if (activeTab === "plans") {
                <app-billing-plans />
            }
            @if (activeTab === "subscriptions") {
                <app-billing-subscriptions />
            }
        </div>
    </div>
</app-sidebar-layout>
