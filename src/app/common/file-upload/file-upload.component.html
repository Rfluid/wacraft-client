<div
    class="flex w-full flex-col items-center justify-center rounded-lg bg-white px-4 py-6 shadow-md dark:bg-gray-800"
>
    <label
        for="file-upload"
        class="flex h-48 w-full cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed bg-gray-50 transition hover:bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:hover:bg-gray-600"
        [ngClass]="{
            'border-blue-500 bg-blue-50 dark:border-blue-400 dark:bg-blue-900/40':
                isDragOver && !hasInvalidType,
            'border-green-500 bg-green-50 dark:border-green-600 dark:bg-green-900':
                uploadedFileName,
            'border-red-500 bg-red-50 dark:border-red-500 dark:bg-red-900/40': hasInvalidType,
        }"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event)"
    >
        <div class="flex flex-col items-center justify-center pb-6 pt-5">
            <mat-icon
                class="material-symbols-outlined upload-icon mb-3"
                [ngClass]="{ '!text-red-500 dark:!text-red-400': hasInvalidType }"
            >
                {{ hasInvalidType ? "error" : uploadedFileName ? "check_circle" : "upload" }}
            </mat-icon>

            <p
                class="mb-2 text-sm text-gray-500 dark:text-gray-300"
                [ngClass]="{ '!text-red-600 dark:!text-red-400': hasInvalidType }"
            >
                @if (hasInvalidType) {
                    <span class="font-semibold" i18n>Invalid file type.</span>
                } @else if (uploadedFileName) {
                    <span class="font-semibold" i18n>File uploaded:</span>
                } @else {
                    <span class="font-semibold" i18n>Click to upload</span>
                    <span>&nbsp;</span>
                    <span i18n>or drag and drop</span>
                }
            </p>
            <p
                class="text-xs text-gray-500 dark:text-gray-300"
                [ngClass]="{ '!text-red-600 dark:!text-red-400': hasInvalidType }"
            >
                @if (uploadedFileName && !hasInvalidType) {
                    {{ uploadedFileName }}
                } @else {
                    @if (acceptedFormats) {
                        <span>{{ acceptedFormats }}</span>
                    }
                }
            </p>
        </div>
        <input
            #fileInput
            id="file-upload"
            type="file"
            class="hidden"
            [attr.accept]="accept || null"
            (change)="onFileChange($event)"
        />
    </label>

    @if (uploadedFileName) {
        <button
            (click)="clearFile()"
            class="mt-3 inline-flex items-center gap-1 rounded-md px-2 py-1 text-sm font-medium text-red-600 transition hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-900/20"
            i18n
        >
            <mat-icon class="material-icons-outlined text-red-500 dark:text-red-400"
                >close</mat-icon
            >
            Remove file
        </button>
    }
</div>
