<button
    type="button"
    class="flex items-center justify-center rounded text-gray-400 transition-all hover:bg-gray-200 hover:text-gray-600 focus:outline-none dark:hover:bg-gray-700 dark:hover:text-gray-300"
    [ngClass]="[sizeButtonClass, buttonClass, copied ? copiedTextClass : '']"
    [class.opacity-100]="copied"
    (click)="copy($event)"
    [title]="copied ? 'Copied!' : 'Copy to clipboard'"
>
    <svg
        *ngIf="!copied"
        [ngClass]="effectiveDefaultIconClass"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
    >
        <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
        />
    </svg>
    <svg
        *ngIf="copied"
        [ngClass]="effectiveCopiedIconClass"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
    >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
    </svg>
</button>
